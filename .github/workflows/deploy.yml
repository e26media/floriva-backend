name: Deploy Backend to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_BACKEND_PATH != '' }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_BACKEND_PATH }}
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            mkdir -p uploads/site-content uploads/products uploads/categories uploads/vendors
            if pm2 describe floriva-api > /dev/null 2>&1; then
              pm2 restart floriva-api
            elif pm2 describe backend > /dev/null 2>&1; then
              pm2 restart backend
            else
              pm2 restart all
            fi
